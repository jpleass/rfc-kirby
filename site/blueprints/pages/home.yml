title: Home
options:
  changeStatus: false
  preview: "{{ page.frontendUrl }}"
sections:
  pageHeader:
    extends: sections/page-header
    fields:
      headline: false
  content:
    type: fields
    fields:
      programmesTitle:
        type: text
        label:
          en: Programmes Title
          nl: Programma's Titel
      programmesIntro:
        type: textarea
        label:
          en: Programmes Introduction
          nl: Programma's Introductie
      testimonialsTitle:
        type: text
        label:
          en: Testimonials Title
          nl: Testimonials Titel
      testimonials:
        type: blocks
        label:
          en: Testimonials
          nl: Testimonials
        fieldsets:
          testimonial:
            label:
              en: Testimonial
              nl: Testimonial
            fields:
              text:
                label: field.blocks.quote.text.label
                placeholder: field.blocks.quote.text.placeholder
                type: writer
                inline: true
                icon: quote
              citation:
                label: field.blocks.quote.citation.label
                placeholder: field.blocks.quote.citation.placeholder
                type: writer
                inline: true
                icon: user
              role:
                label:
                  en: Role
                  nl: Rol
                type: text
              logo:
                label:
                  en: Logo
                  nl: Logo
                type: files
                max: 1
              cover:
                label:
                  en: Image
                  nl: Afbeelding
                type: files
                multiple: false
      pageLinks:
        type: blocks
        label:
          en: Page Links
          nl: Pagina Links
        fieldsets:
          pageLink:
            label:
              en: Page Link
              nl: Pagina Link
            fields:
              title:
                type: text
                label:
                  en: Title
                  nl: Titel
              page:
                type: pages
                label:
                  en: Page
                  nl: Pagina
                multiple: false
              text:
                type: textarea
                label:
                  en: Text
                  nl: Tekst
              cover:
                type: files
                label:
                  en: Image
                  nl: Afbeelding
                multiple: false
