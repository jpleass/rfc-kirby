title: About
options:
  preview: "{{ page.frontendUrl }}"
columns:
  main:
    width: 2/3
    sections:
      pageHeader:
        extends: sections/page-header
      fields:
        type: fields
        fields:
          teamTitle:
            type: text
            label:
              en: Team Section Title
              nl: Titel Team Sectie
            help:
              en: Title for the team section on the about page.
              nl: Titel voor de team sectie op de over pagina.
          documentationTitle:
            type: text
            label:
              en: Documentation Section Title
              nl: Titel Documentatie Sectie
            help:
              en: Title for the documentation section on the about page.
              nl: Titel voor de documentatie sectie op de over pagina.
          documentationText:
            type: textarea
            label:
              en: Documentation Section Text
              nl: Tekst Documentatie Sectie
            help:
              en: Text for the documentation section on the about page.
              nl: Tekst voor de documentatie sectie op de over pagina.
          faqTitle:
            type: text
            label:
              en: FAQ Section Title
              nl: Titel FAQ Sectie
            help:
              en: Title for the FAQ section on the about page.
              nl: Titel voor de FAQ sectie op de over pagina.
          faqText:
            type: textarea
            label:
              en: FAQ Section Text
              nl: Tekst FAQ Sectie
            help:
              en: Text for the FAQ section on the about page.
              nl: Tekst voor de FAQ sectie op de over pagina.
          faqButtons:
            extends: fields/buttons
          faqItems:
            type: structure
            label:
              en: FAQ Items
              nl: FAQ Items
            help:
              en: Add items for the FAQ section. Each item will have a question and an answer.
              nl: Voeg items toe voor de FAQ sectie. Elk item heeft een vraag en een antwoord.
            fields:
              question:
                type: text
                label:
                  en: Question
                  nl: Vraag
              answer:
                type: textarea
                label:
                  en: Answer
                  nl: Antwoord
