title: About
options:
  preview: "{{ page.frontendUrl }}"
columns:
  main:
    width: 2/3
    sections:
      pageHeader:
        extends: sections/page-header
      fields:
        type: fields
        fields:
          informationCards:
            type: blocks
            label:
              en: Information Cards
              nl: Informatieve Kaarten
            help:
              en: Add information cards for the about page.
              nl: Voeg informatieve kaarten toe voor de over pagina.
            fieldsets:
              - informationCard
          teamTitle:
            type: text
            label:
              en: Team Section Title
              nl: Titel Team Sectie
            help:
              en: Title for the team section on the about page.
              nl: Titel voor de team sectie op de over pagina.
          teamMembers:
            type: pages
            label:
              en: Team Members
              nl: Teamleden
            help:
              en: Add team members for the team section on the about page.
              nl: Voeg teamleden toe voor de team sectie op de over pagina.
            query: "site.index.template('team')"
          documentationTitle:
            type: text
            label:
              en: Documentation Section Title
              nl: Titel Documentatie Sectie
            help:
              en: Title for the documentation section on the about page.
              nl: Titel voor de documentatie sectie op de over pagina.
          documentationText:
            type: textarea
            label:
              en: Documentation Section Text
              nl: Tekst Documentatie Sectie
            help:
              en: Text for the documentation section on the about page.
              nl: Tekst voor de documentatie sectie op de over pagina.
          documentationFiles:
            type: files
            label:
              en: Documentation Files
              nl: Documentatie Bestanden
            help:
              en: Add files for the documentation section on the about page.
              nl: Voeg bestanden toe voor de documentatie sectie op de over pagina.
            template: data-file
            uploads: false
            query: "site.index.files.template('data-file')"
      faq:
        extends: sections/faq
