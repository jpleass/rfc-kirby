title: Content Article
options:
  preview: "{{ page.frontendUrl }}"

tabs:
  header:
    icon: box
    columns:
      main:
        width: 2/3
        sections:
          programme: sections/programme
          contentHeader: sections/content-header
          fields:
            type: fields
            fields:
              author:
                type: text
                width: 1/2
              date:
                type: date
                default: today
                width: 1/2
      files:
        width: 1/3
        sections:
          files: sections/files
  content:
    icon: file-text
    label:
      en: Content
      nl: Inhoud
    columns:
      main:
        width: 2/3
        sections:
          content: sections/content
      files:
        width: 1/3
        sections:
          files: sections/files
  relatedPartners: tabs/related-partners
