title: Programmes
options:
  preview: "{{ page.frontendUrl }}"

tabs:
  main:
    columns:
      main:
        width: 2/3
        sections:
          colors:
            type: fields
            fields:
              color1:
                label: Color 1
                extends: fields/color
              color2:
                label: Color 2
                extends: fields/color
              archive:
                type: toggle
                label:
                  en: Archive Project
                  nl: Archief Project
                help:
                  en: Toggle to archive this project.
                  nl: Schakel in om dit project te archiveren.
              cover:
                type: files
                multiple: false
                label:
                  en: Cover Image
                  nl: Omslagafbeelding
                help:
                  en: Upload a cover image for this project.
                  nl: Upload een omslagafbeelding voor dit project.
              vimeoId:
                type: text
                label:
                  en: Vimeo ID
                  nl: Vimeo ID
          pageHeader:
            extends: sections/page-header
            fields:
              buttons: false
          fields:
            type: fields
            fields:
              # video:
              #   type: url
              #   label:
              #     en: Video URL
              #     nl: Video URL
              #   width: 1/1
              relatedEvents:
                width: 1/2
                type: pages
                label:
                  en: Related Events
                  nl: Gerelateerde Evenementen
                help:
                  en: Select related events.
                  nl: Selecteer gerelateerde evenementen.
                multiple: true
                query: site.index.template('content-event')
              featuredArticle:
                width: 1/2
                type: pages
                label:
                  en: Featured Article
                  nl: Uitgelicht Artikel
                help:
                  en: Select a featured article for this project.
                  nl: Selecteer een uitgelicht artikel voor dit project.
                multiple: false
                query: site.index.template('content-article')
              relatedArticles:
                width: 1/2
                type: pages
                label:
                  en: Related Articles
                  nl: Gerelateerde Artikelen
                help:
                  en: Select related articles.
                  nl: Selecteer gerelateerde artikelen.
                multiple: true
                query: site.index.template('content-article')
      files:
        width: 1/3
        sections:
          files:
            type: files
  relatedMembers:
    extends: tabs/related-members
