name: field.blocks.gallery.name
icon: dashboard
preview: gallery
fields:
  images:
    label: field.blocks.gallery.images.label
    type: files
    query: model.images
    max: 2
    multiple: true
    layout: cards
    size: small
    empty: field.blocks.gallery.images.empty
    uploads:
      template: blocks/image
    image:
      ratio: 1/1
    help:
      en: Use caption field inside image block to add captions to individual images.
      nl: Gebruik het bijschriftveld in het afbeeldingsblok om bijschriften aan individuele
